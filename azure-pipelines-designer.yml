trigger:
  branches:
    include:
      - '*'
    exclude:
      - master
  paths:
    include:
      - src/orbital-designer/*
      - azure-pipelines-designer.yml
      
variables:
  buildConfiguration: 'Release'

resources:
  containers:
  - container: node
    image: selenium/node-chrome:latest
    options: --user 0:0

stages:
- stage: build   
  jobs:
  - job: install_and_build
    displayName: install and build
    pool:
      vmImage: 'Ubuntu 16.04'
    steps:
    - task: DeleteFiles@1
      displayName: 'Cleanup JUnit files'
      inputs:
        SourceFolder: ./junit
        Contents: 'TEST*.xml'

    - task: Npm@1
      displayName: 'npm ci'
      inputs:
        command: ci   
        workingDir: './src/orbital-designer' 

    - task: Npm@1
      displayName: 'npm run build --prod'
      inputs:
        command: custom
        customCommand: run build -- --prod    
        workingDir: './src/orbital-designer' 

    - task: PublishBuildArtifacts@1
      displayName: 'Publish angular build artifact orbital-designer'
      inputs:
        PathtoPublish: './src/orbital-designer/dist'
        ArtifactName: orbital-designer

- stage: test
  dependsOn: [] 
  jobs:
  - job: test_and_publish
    displayName: test and publish
    pool:
      vmImage: 'Ubuntu 16.04'
    steps:
    - task: Npm@1
      displayName: 'npm ci'
      inputs:
        command: ci   
        workingDir: './src/orbital-designer' 
  
