<mat-card class="mat-elevation-z20 import-from-file-container">
  <mat-card-title>Import From File</mat-card-title>
  <mat-card-subtitle
    >Import an existing Mockdefinition file below</mat-card-subtitle
  >
  <app-file-input
    class="row capitalize"
    [control]="formGroup.controls.openApiFile"
    placeholder="Select File - Required"
    fileTypes=".yml,.yaml"
  >
  </app-file-input>
  <mat-card-subtitle>Imported Mock Definitions</mat-card-subtitle>
  <mat-card class="import-from-file">
    <div *ngFor="let file of files">
      <mat-list>
        <mat-list-item>
          <h3 matLine>{{ file.title }}</h3>
          <p matLine>{{ file.error }}</p>
          <mat-icon matListIcon>
            <span *ngIf="!!file.error">cancel</span>
            <span *ngIf="!file.error">check_circle_outline</span></mat-icon
          >
        </mat-list-item>
        <mat-divider></mat-divider>
      </mat-list>
    </div>
  </mat-card>

  <div class="row buttons-div">
    <button mat-raised-button color="primary" (click)="goBack()">
      Back
    </button>
    <button
      mat-raised-button
      color="primary"
      [disabled]="formGroup.invalid"
      (click)="createMock()"
    >
      Next
    </button>
  </div>
</mat-card>
