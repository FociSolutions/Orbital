<div class="fullscreen column center-hr">
  <div class="container scenarioview">
    <div class="row">
      <div class="sidebar">
        <app-side-bar></app-side-bar>
      </div>
      <div class="scenarios">
        <div>
          <app-overview [header]="headerContent"></app-overview>
        </div>
        <div>
          <app-search-bar
          [list]="scenarioList| getEndpointScenarios: selectedEndpoint"
          (filteredList)="setFilteredList($event)"
          [itemToStringFn]="scenarioToString"
          > </app-search-bar>
          <app-no-search-results-view *ngIf="showNotFound()"></app-no-search-results-view>
          <p *ngIf="endpointNoScenarios()" id="notFoundMessage">No scenarios exists. Click the add button to create a new scenario.</p>
          <app-scenario-list
            *ngIf="!!mockDefinition"
            [scenarios]="filteredList"
          ></app-scenario-list>
          <button (click)="addScenario()" id="add" mat-fab color="primary">
            +
          </button>
        </div>
        <button
          id="back-to-endpoints"
          mat-raised-button
          color="primary"
          (click)="goToEndpoints()"
        >
          Back to Endpoints
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #headerContent let-path="path">
  <div class="title row center">
    <mat-chip-list
      ><mat-chip [ngClass]="this.getEndpointVerb()">{{
        this.getEndpointVerb()
      }}</mat-chip>
    </mat-chip-list>
    <h3>
      {{ !!selectedEndpoint ? selectedEndpoint.path : null }}
    </h3>
  </div>
  <p id="description">{{ getScenarioDescription() }}</p>
</ng-template>
