<div class="fullscreen column center-hr">
  <div class="container scenarioview">
    <div class="row">
      <div class="sidebar">
        <app-side-bar></app-side-bar>
      </div>
      <div class="scenarios">
        <div>
          <app-overview [header]="headerContent"></app-overview>
        </div>
        <div>
          <app-search-bar> </app-search-bar>
          <app-scenario-list
            *ngIf="!!mockDefinition"
            [scenarios]="
              mockDefinition.scenarios | getEndpointScenarios: selectedEndpoint
            "
          ></app-scenario-list>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #headerContent let-path="path">
  <div class="title">
    <h3>
      {{ !!selectedEndpoint ? selectedEndpoint.path : null }}
    </h3>
  </div>
</ng-template>
