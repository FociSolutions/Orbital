<div class="fullscreen column center-hr">
  <div class="container scenarioview">
    <div class="row">
      <div class="sidebar">
        <app-side-bar></app-side-bar>
      </div>
      <div class="scenarios">
        <div>
          <app-overview [header]="headerContent"></app-overview>
        </div>
        <div>
          <app-search-bar
          [list]="scenarioList| getEndpointScenarios: selectedEndpoint"
          (filteredList)="setFilteredList($event)"
          [itemToStringFn]="scenarioToString"
          > </app-search-bar>
          <p *ngIf="showNotFound()" id="description">No Result(s) Found</p>

          <app-scenario-list
            *ngIf="!!mockDefinition"
            [scenarios]="
            filteredList
            "
          ></app-scenario-list>
          <button (click)="addScenario()" id="add" mat-fab color="primary">+</button>
        </div>
        <button id="back-to-endpoints" mat-raised-button color="primary" (click)="goToEndpoints()">
          Back to Endpoints
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #headerContent let-path="path">
  <div class="title">
    <h3>
      {{ !!selectedEndpoint ? selectedEndpoint.path : null }}
    </h3>
  </div>
  <p id="description">{{ getScenarioDescription() }}</p>
</ng-template>
