<mat-card *ngIf="!!scenario" class="scenariolistitemcontainer mincardheight">
  <mat-card-content>
    <mat-card-title> {{ scenario?.metadata.title }} </mat-card-title>
    <mat-card-subtitle>
      <div class="subtitle">
        <div>{{ scenario?.metadata.description }}</div>
        <div>
          {{ scenario?.response.status }} |
          {{ getScenarioResponseStatusString() }}
        </div>
      </div>
    </mat-card-subtitle>
  </mat-card-content>
</mat-card>
