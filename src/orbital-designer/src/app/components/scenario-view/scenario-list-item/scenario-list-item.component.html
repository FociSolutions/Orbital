<mat-card *ngIf="!!scenario" class="endpointlistitemcontainer">
  <mat-card-header class="{{ scenario.verb | lowercase }} column center">
    <mat-card-title class="verb">{{ scenario.verb }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <mat-card-title> {{ scenario.path }} </mat-card-title>
    <mat-card-subtitle>
      <div class="subtitle">
        <div>{{ scenarioDescription }}</div>
      </div>
    </mat-card-subtitle>
  </mat-card-content>
</mat-card>
