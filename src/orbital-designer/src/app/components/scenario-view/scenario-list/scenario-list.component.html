<mat-list class="scenariolistcontainer">
  <mat-list-item *ngFor="let scenario of scenarios">
    <div id="scenario-list-item">
      <mat-card
      *ngIf="!!scenario"
      class="scenario-list-item-container min-card-height"
    >
      <mat-card-content [routerLink]="this.isHoveringOverMenu ? null : ['/scenario-editor', scenario.id]" routerLinkActive="is-active">
        <mat-card-title>
          <div>{{ scenario?.metadata.title }}</div>
          <div class="scenario-options-menu">
            <button
              mat-icon-button
              [mat-menu-trigger-for]="menu"
              aria-label="Example icon-button with a menu"
              (mouseout)="this.isHoveringOverMenu = false"
              (mouseover)="this.isHoveringOverMenu = true"
            >
              <mat-icon>more_horiz</mat-icon>
            </button>
            <mat-menu #menu="matMenu" xPosition="before">
              <button mat-menu-item (click)="cloneScenario(scenario)">
                <mat-icon>file_copy</mat-icon>
                <span>Clone</span>
              </button>
              <button mat-menu-item (click)="confirmDeleteDialog()">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </div>
        </mat-card-title>

        <mat-card-subtitle>
          <div class="subtitle">
            <div>{{ scenario?.metadata.description }}</div>
            <div>
              {{ scenario?.response.status }} |
              {{ getScenarioResponseStatusString(scenario) }}
            </div>
          </div>
        </mat-card-subtitle>
      </mat-card-content>
    </mat-card>

    <div class="overlay" *ngIf="triggerOpen">
      <div class="confirm-scenario-delete-dialog">
        <mat-card>
          <app-dialog-box
            titleText="Confirm Scenario Deletion"
            confirmButtonText="DELETE"
            cancelButtonText="CANCEL"
            [bodyText]="getBodyText(scenario)"
            (choiceBoolean)="onDialogAction($event, scenario)"
          ></app-dialog-box>
        </mat-card>
      </div>
    </div>
    </div>
  </mat-list-item>
</mat-list>
