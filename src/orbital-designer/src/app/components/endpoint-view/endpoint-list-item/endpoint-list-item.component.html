<mat-card class="endpointlistitemcontainer">
        <mat-card-header class="{{endpoint.verb | lowercase}}">
            <div class="verb">{{endpoint.verb}}</div> 
        </mat-card-header>
        <mat-card-content>       
                <mat-card-title> {{endpoint.path}} </mat-card-title>
                <mat-card-subtitle>
                    <div class="subtitle">   
                        <div class="subtitle-left">{{endpointDescription}}</div>
                        <div class="subtitle-right">{{scenarioCount}} Scenarios</div>
                    </div>        
                </mat-card-subtitle>
        </mat-card-content>          
</mat-card>
