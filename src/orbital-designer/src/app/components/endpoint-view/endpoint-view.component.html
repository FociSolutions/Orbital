<div class="fullscreen column center-hr">
  <div class="container endpointview">
    <div class="row">
      <div class="sidebar">
        <app-side-bar></app-side-bar>
      </div>
      <div class="endpoint">
        <div>
          <app-overview [header]="headerContent"></app-overview>
        </div>
        <div class="column">
          <app-search-bar
            class="column flex-grow"
            [list]="endpointList"
            (filteredList)="setFilteredList($event)"
            [itemToStringFn]="endpointToString"
          >
          </app-search-bar>
          <app-endpoint-list
            class="row flex-grow"
            [endpoints]="filteredList"
          ></app-endpoint-list>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #headerContent>
  <div class="title">
    <h3>{{ this.mockDefinition.metadata?.title }}</h3>
  </div>
  <p>{{ this.mockDefinition.metadata?.description }}</p>
</ng-template>
