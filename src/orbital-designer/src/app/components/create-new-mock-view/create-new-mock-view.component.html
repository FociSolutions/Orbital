<mat-card class="create-mock-form row center-hr">
  <form class="column">
    <h3 class="capitalize">Create New Mock</h3>
    <app-text-input
      class="titleInput capitalize"
      title="Title - Required"
      maxLength="200"
      [control]="formGroup.controls.title"
      [errorMessage]="errorMessage('title')"
    ></app-text-input>
    <app-text-input
      class="flex-grow capitalize"
      title="Description"
      maxLength="1000"
      multiLine="true"
      [control]="formGroup.controls.description"
      [errorMessage]="errorMessage('description')"
    ></app-text-input>
    <app-file-input
      class="row capitalize"
      [control]="formGroup.controls.openApiFile"
      label="Select File - Required"
      fileTypes=".yml,.yaml"
      [errorMessage]="errorMessage('openApiFile')"
    >
    </app-file-input>
    <div class="row buttons-div">
      <button mat-raised-button color="primary" (click)="goBack()">
        Back
      </button>
      <button
        mat-raised-button
        color="primary"
        [disabled]="formGroup.invalid"
        (click)="createMock()"
      >
        Next
      </button>
    </div>
  </form>
</mat-card>
