<mat-card class="mat-elevation-z20 import-from-file-container flexColumn">
  <mat-card-title>Import From File</mat-card-title>
  <mat-card-subtitle>Import an existing Mockdefinition file below</mat-card-subtitle>
  <app-file-input
    class="capitalize"
    (fileContentEmit)="setMockDefinition($event)"
    (fileNameEmit)="setMockDefinitionName($event)"
    (clearContentEmit)="checkEmit(true)"
    label="Select Files - Required"
    accept=".json"
    [errorMessage]="errorMessageToEmitFromCreate"
  >
  </app-file-input>
  <h3>
  <div class="expand">
    <div>
      <mat-card-subtitle>Imported Mockdefinition(s)</mat-card-subtitle>
    </div>
    <mat-list dense>
      <mat-list-item>
        
          <ul class="noDots">
            <li *ngFor="let mocks of mockdefinitionValid">
              {{ mocks | titlecase }}
              <mat-icon matListIcon  color="primary">check_circle_outline</mat-icon>
            </li>
            <li *ngFor="let mocks of mockdefinitionInvalid">
              {{ mocks | titlecase }}
              <mat-icon matListIcon  color="warn">cancel</mat-icon>
            </li>
          </ul>       
        <p *ngIf="!isValid()">Valid File Required</p>
      </mat-list-item>
    </mat-list>
  </div>
  </h3>
<div class="row buttons-div">
    <button mat-raised-button color="primary" (click)="goBack()">
      Back
    </button>
    <button mat-raised-button color="primary" [disabled]="buttonDisabled" (click)="createMock()">
      Next
    </button>
  </div>
</mat-card>
