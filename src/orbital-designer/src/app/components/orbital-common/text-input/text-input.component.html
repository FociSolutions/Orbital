<mat-form-field *ngIf="!multiLine">
  <input
    matInput
    [placeholder]="title"
    [formControl]="control"
    [errorStateMatcher]="errorStateMatcher"
    autocomplete="off"
  />
  <mat-error>
    {{ errorMessage }}
  </mat-error>
  <mat-hint *ngIf="!!maxLength" align="end"
    >{{ control.value?.length }}/{{ maxLength }}</mat-hint
  >
</mat-form-field>
<mat-form-field *ngIf="multiLine">
  <textarea
    matInput
    cdkTextareaAutosize
    cdkAutosizeMinRows="8"
    [placeholder]="title"
    [formControl]="control"
    [errorStateMatcher]="errorStateMatcher"
    autocomplete="off"
  ></textarea>
  <mat-error *ngFor="let error of errorMessage.split('\n')">
    {{ error }}
  </mat-error>
  <mat-hint *ngIf="!!maxLength" align="end"
    >{{ control.value?.length }}/{{ maxLength }}</mat-hint
  >
</mat-form-field>
