<mat-form-field floatLabel="always">
  <mat-label>{{ label }}</mat-label>
  <div>
    <div class="div-file-name">
      <ul>
        <li *ngFor="let names of fileName">
          {{ names }}
        </li>
      </ul>
    </div>
    <button mat-raised-button color="primary" type="button" (click)="fileInput.click()">
      Choose File
    </button>
  </div>

  <input
    #fileInput
    [multiple]="this.multiple"
    type="file"
    (change)="emitFileContent($event.target.files)"
    style="display:none;"
    [accept]="accept"
  />
  <input matInput style="display:none;" />
</mat-form-field>

<div *ngFor="let message of errormessages | keyvalue">
  <p class="error-message">{{ message.key }} :</p>
  <li class="error-message" *ngFor="let v of message.value">
    {{ v }}
  </li>
</div>
