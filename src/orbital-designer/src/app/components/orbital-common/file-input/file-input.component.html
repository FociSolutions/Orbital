<mat-form-field [floatLabel]="always">
  <mat-label>{{ label }}</mat-label>
  <div>
    <div class="div-file-name">{{ fileName }}</div>
    <button mat-raised-button color="primary" (click)="fileInput.click()">
      Choose File
    </button>
  </div>
  <input
    #fileInput
    type="file"
    (change)="onFileChange($event.target.files)"
    style="display:none;"
    [accept]="fileTypes"
  />
  <input
    matInput
    [placeholder]="placeholder"
    [formControl]="control"
    style="display:none;"
    [errorStateMatcher]="errorStateMatcher"
  />
  <mat-error *ngFor="let error of errorMessage.split('\n')">
    {{ error }}
  </mat-error>
</mat-form-field>
