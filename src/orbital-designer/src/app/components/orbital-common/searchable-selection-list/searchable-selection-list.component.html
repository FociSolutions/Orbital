<mat-card>
  <div class="search-bar-div">
    <mat-icon>search</mat-icon><input #searchBar matInput />
  </div>
  <div *ngIf="!!this.list.length" class="checkbox-div">
    <mat-checkbox
      labelPosition="before"
      (change)="onSelectAll($event)"
      [checked]="selectAllChecked"
    >
      {{ checkboxLabel }}
    </mat-checkbox>
  </div>
  <mat-selection-list #matList (selectionChange)="optionSelected($event)">
    <mat-list-option *ngFor="let item of getSearchedList()" [value]="item">
      <ng-container
        *ngTemplateOutlet="itemTemplate; context: { item: item }"
      ></ng-container>
    </mat-list-option>
    <mat-list-item class="emptyMessage" *ngIf="list.length === 0">
      <span>{{ emptyListMessage }}</span>
    </mat-list-item>
    <mat-list-item
      class="emptyMessage"
      *ngIf="list.length > 0 && getSearchedList().length === 0"
    >
      <span>{{ noSearchResultsMessage }}</span>
    </mat-list-item>
  </mat-selection-list>
</mat-card>
