<app-text-input
  class="capitalize"
  title="Server URI - Required"
  maxLength="200"
  [control]="inputControl"
></app-text-input>
<mat-error>{{ this.errorMessages }}</mat-error>
<div id="submit-buttons">
  <button
    mat-raised-button
    color="primary"
    (click)="sendRequest()"
    [disabled]="canSendRequest()"
  >
    Submit</button
  ><mat-spinner
    diameter="25"
    id="{{ this.requestInProgress ? 'show-spinner' : 'hide-spinner' }}"
  ></mat-spinner>
</div>
