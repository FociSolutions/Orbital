<div class="container">
  <app-text-input
    [title]="title"
    maxLength="200"
    [control]="inputControl"
    errorText="Please input a valid URI"
  ></app-text-input>
  <div id="submit-buttons">
    <button
      mat-raised-button
      color="primary"
      (click)="sendRequest()"
      [disabled]="sendRequestDisabled()"
    >
      Submit</button
    ><mat-spinner diameter="25" [id]="getSpinnerId()"></mat-spinner>
  </div>
</div>
