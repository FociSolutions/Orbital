<app-text-input
  class="capitalize"
  title="Server URI - Required"
  maxLength="200"
  [control]="inputControl"
  [errorMessages]="errorMessages"
></app-text-input>
<div id="submit-buttons">
  <button
    mat-raised-button
    color="primary"
    (click)="sendRequest()"
    [disabled]="!inputControl.valid"
  >
    Submit
  </button>
</div>
