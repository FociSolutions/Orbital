<mat-card class="kvp-add-card">
  <form class="kvp-add">
    <mat-form-field class="kvp-key">
      <input
        matInput
        placeholder="Key"
        [formControl]="keyFormControl"
        required
      />
      <mat-error *ngIf="keyFormControl.hasError('invalid')"
        >Key is required</mat-error
      >
    </mat-form-field>
    <mat-form-field class="kvp-value">
      <input matInput placeholder="Value" />
    </mat-form-field>
    <button
      mat-mini-fab
      class="add-button"
      color="primary"
      (click)="this.keyFormControl.setErrors({ invalid: true })"
    >
      <mat-icon>add</mat-icon>
    </button>
  </form>
</mat-card>
