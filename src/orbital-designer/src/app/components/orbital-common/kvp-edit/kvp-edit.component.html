<p class="description">{{ addKvpTitle }}</p>
<app-kvp-add (kvp)="addKvpRule($event)"></app-kvp-add>

<mat-divider class="divider-padding"></mat-divider>
<div>
  <p class="description">{{ listKvpTitle }}</p>
</div>
<div *ngIf="!this.savedKvpRules?.length">
  No rules Added
</div>
<div *ngIf="this.savedKvpRules?.length">
  <div *ngFor="let kv of savedKvpRules">
    <app-kvp-list-item
      [kvp]="kv"
      (removeKvp)="deleteKvpRule($event)"
    ></app-kvp-list-item>
  </div>
</div>
