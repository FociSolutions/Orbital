<p class="description">{{ addKvpTitle }}</p>

<div class="kvp-edit-rule">
  <mat-divider class="divider-padding"></mat-divider>
  <div>
    <p class="description">{{ listKvpTitle }}</p>
  </div>
  <div *ngIf="!this.savedKvpType?.length">
    No rules Added KVP Rule
  </div>
  <div *ngFor="let kv of savedKvpType">
    <app-kvp-list-item-rule-type
      [kvp]="kv"
      (removeKvp)="deleteKvpFromRule($event)"
    ></app-kvp-list-item-rule-type>
  </div>
</div>
