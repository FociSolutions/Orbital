<p class="description">{{ addKvpTitle }}</p>
<app-kvp-add-rule (kvp)="addKvpToMap($event)"></app-kvp-add-rule>

<div class="kvp-edit-rule">
  <mat-divider class="divider-padding"></mat-divider>
  <div>
    <p class="description">{{ listKvpTitle }}</p>
  </div>
  <div *ngIf="!this.savedKvpMap?.length">
    No rules Added
  </div>
  <div *ngFor="let kv of savedKvpMap">
    <app-kvp-list-item-rule
      [kvp]="kv.rule"
      (removeKvp)="deleteKvpFromMap($event)"
    ></app-kvp-list-item-rule>
  </div>
</div>
