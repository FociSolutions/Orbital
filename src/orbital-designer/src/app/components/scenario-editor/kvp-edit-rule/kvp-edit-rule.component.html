<p class="description">{{ addKvpTitle }}</p>

<div class="kvp-edit-rule">
  <mat-divider class="divider-padding"></mat-divider>
  <div>
    <p class="description">{{ listKvpTitle }}</p>
  </div>
  <ng-template [ngIf]="!this.savedKvpType?.length" [ngIfElse]="noRulesAdded">
    <div *ngFor="let kv of savedKvpType">
      <app-kvp-list-item-rule-type [kvp]="kv" (removeKvp)="deleteKvpFromRule($event)"></app-kvp-list-item-rule-type>
    </div>
  </ng-template>
</div>

<ng-template #noRulesAdded>
  No rules Added KVP Rule
</ng-template>
