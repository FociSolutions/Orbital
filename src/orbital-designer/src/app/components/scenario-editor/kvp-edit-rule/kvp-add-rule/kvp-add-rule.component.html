<mat-card class="kvp-add-card">
  <form class="kvp-add">
    <mat-form-field class="kvp-key">
      <input matInput placeholder="Key" [(ngModel)]="key" name="key-input" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Select Rule</mat-label>
      <mat-select [(ngModel)]="selectedValue" name="food">
        <mat-option *ngFor="let rule of rules" [value]="rule.value">
          {{rule.viewValue}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="kvp-value">
      <input
        matInput
        placeholder="Value"
        [(ngModel)]="value"
        name="value-input"
      />
    </mat-form-field>

    <button mat-mini-fab class="add-button" color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon>
    </button>
  </form>
  <div class="error-message" *ngIf="!this.isValid">
    {{ this.errorMessage }}
  </div>
</mat-card>
