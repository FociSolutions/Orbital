<mat-card class="kvp-add-card">
  <form class="kvp-added-item">
    <mat-form-field class="kvp-key">
      <input
        #inputkey
        matInput
        placeholder="Key"
        maxlength="200"
        [(ngModel)]="key"
        name="key-input"
        [ngModelOptions]="{ standalone: true }"
      />
      <mat-hint> {{inputkey.value?.length || 0}}/200</mat-hint>
    </mat-form-field>

    <mat-form-field class="kvp-type">
      <mat-label>Select Rule</mat-label>
      <mat-select [(ngModel)]="ruleType" name="rule-type">
        <div *ngFor="let rule of rules">
          <mat-option [value]="rule.value">
            {{ rule.viewValue }}
          </mat-option>
        </div>
      </mat-select>
    </mat-form-field>

    <mat-form-field class="kvp-value">
      <input
        #inputvalue
        matInput
        maxlength="3000"
        placeholder="Value"
        [(ngModel)]="value"
        name="value-input"
        [ngModelOptions]="{ standalone: true }"
      />
      <mat-hint> {{inputvalue.value?.length || 0}}/3000</mat-hint>
    </mat-form-field>
    <div class="error-message" *ngIf="isValid()">
      Regex value is required
    </div>

    <div class="delete-button-container">
      <button class="delete-button" (click)="onRemove()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </form>
</mat-card>
