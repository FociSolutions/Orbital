<div class="fullscreen column center-hr">
  <div class="container editor">
    <div class="row">
      <div class="sidebar">
        <app-side-bar></app-side-bar>
      </div>
      <div class="metadata">
        <div>
          <app-overview [header]="headerContent"></app-overview>
        </div>
        <div id="metadata-cards">
          <h3>Scenario Properties</h3>

          <app-scenario-card [title]="'Metadata'" [description]="'Name and Description'" [cardTemplate]="metadataCardContent"
            (panelOpened)="handleNameDescriptionPanelOpen()" (panelClosed)="handleNameDescriptionPanelClose()" [panelExpanded]="this.nameDescriptionPanelExpanded">
          </app-scenario-card>

          <mat-card>
            <mat-card-title>Request Match Rules</mat-card-title>
            <mat-card-subtitle>Query Match Rules, Header Match Rules...</mat-card-subtitle>
          </mat-card>
          <mat-card>
            <mat-card-title>Response</mat-card-title>
            <mat-card-subtitle>Scenario Description</mat-card-subtitle>
          </mat-card>
        </div>
        <button id="go-to-scenarios" color="primary" mat-raised-button (click)="goToScenarios()">Back to Scenarios</button>
      </div>
    </div>
  </div>
</div>

<ng-template #headerContent let-path="path">
  <div class="title">
    <h3>
      New Scenario
    </h3>
  </div>
</ng-template>

<ng-template #metadataCardContent>
  <form [formGroup]="nameAndDescriptionFormGroup">
    <mat-divider></mat-divider>
    <mat-form-field>
      <input matInput placeholder="Name" formControlName="name" maxlength="50">
    </mat-form-field>
    <br />
    <mat-form-field>
      <input matInput placeholder="Description" formControlName="description" maxlength="50">
    </mat-form-field>
    <div id="cancel-save-buttons">
      <button id="cancel" (click)="handleCancelButtonClick()" mat-raised-button color="primary">
        Cancel
      </button>
      <button [disabled]="saveButtonDisabledState()" (click)="handleSaveButtonClick()" id="save" mat-raised-button color="primary">
        Save
      </button>
    </div>
  </form>
</ng-template>
