<mat-accordion>
    <mat-expansion-panel [disabled]="cannotClose()">
      <mat-expansion-panel-header class="right-aligned-header">
        <mat-panel-title>
          Request Match Rules
        </mat-panel-title>
        <mat-divider></mat-divider>
      </mat-expansion-panel-header>
      <mat-accordion>
        <mat-expansion-panel class="mat-elevation-z0">
          <mat-expansion-panel-header class="right-aligned-header">
            <mat-panel-title>
              Header Match Rules
            </mat-panel-title>
            <mat-divider></mat-divider>
          </mat-expansion-panel-header>
          <app-kvp-edit
          [addKvpTitle]="'Add New Header Match Rule'"
          [listKvpTitle]="'Added Header Match Rules'"
          [Save]="this.saveStatus"
          [kvpMap]="getHeaderRules()"
          (savedKvpMapEmitter)="handleHeaderKvpOutput($event)">
        </app-kvp-edit>
        </mat-expansion-panel>
      </mat-accordion>
      <mat-accordion>
          <mat-expansion-panel>
            <mat-expansion-panel-header class="right-aligned-header">
              <mat-panel-title>
                Query Match Rules
              </mat-panel-title>
              <mat-divider></mat-divider>
            </mat-expansion-panel-header>
            <app-kvp-edit
            [addKvpTitle]="'Add New Query Match Rule'"
            [listKvpTitle]="'Added Query Match Rules'"
            [Save]="this.saveStatus"
            [kvpMap]="getQueryRules()"
            (savedKvpMapEmitter)="handleQueryKvpOutput($event)">
          </app-kvp-edit>
          </mat-expansion-panel>
        </mat-accordion>
    </mat-expansion-panel>
  </mat-accordion>
