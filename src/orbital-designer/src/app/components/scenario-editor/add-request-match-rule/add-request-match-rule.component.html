<mat-accordion>
  <mat-expansion-panel
    [disabled]="this.isCardDisabled"
    [expanded]="this.panelExpanded"
  >
    <mat-expansion-panel-header class="right-aligned-header">
      <mat-panel-title>
        Request Match Rules
      </mat-panel-title>
      <mat-panel-description
        >Query Match Rules, Header Match Rules and Body Match
        Rules</mat-panel-description
      >
    </mat-expansion-panel-header>
    <mat-accordion>
      <!-- Add logic to kvp-list-item-rule-type component-->
      <!-- <mat-form-field>
        <mat-label>Add New Rule</mat-label>
        <mat-select [(value)]="selectedRule" ngModelChange>
          <mat-option *ngFor="let rule of rulesOptions" [value]="rule">
            {{ rule | titlecase }}
          </mat-option>
        </mat-select>
      </mat-form-field> -->
      <mat-form-field>
        <mat-label>Add New Rule</mat-label>
        <mat-select [(value)]="selectedRuleType" ngModelChange>
          <mat-option *ngFor="let rule of ruleTypes" [value]="rule">
            {{ rule }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-expansion-panel class="mat-elevation-z0">
        <mat-expansion-panel-header class="right-aligned-header">
          <mat-panel-title>
            Header Match Rules
          </mat-panel-title>
          <mat-divider></mat-divider>
        </mat-expansion-panel-header>
        <app-kvp-edit-rule
          [addKvpTitle]="'Add New Header Match Rule'"
          [listKvpTitle]="'Added Header Match Rules'"
          [Save]="this.shouldSave"
          (savedKvpEmitter)="handleHeaderKvpOutput($event)"
        >
        </app-kvp-edit-rule>
      </mat-expansion-panel>
    </mat-accordion>
    <mat-accordion>
      <mat-expansion-panel class="mat-elevation-z0">
        <mat-expansion-panel-header class="right-aligned-header">
          <mat-panel-title>
            Query Match Rules
          </mat-panel-title>
          <mat-divider></mat-divider>
        </mat-expansion-panel-header>
        <app-kvp-edit-rule
          [addKvpTitle]="'Add New Query Match Rule'"
          [listKvpTitle]="'Added Query Match Rules'"
          [Save]="this.shouldSave"
          (savedKvpEmitter)="handleQueryKvpOutput($event)"
        >
        </app-kvp-edit-rule>
      </mat-expansion-panel>
    </mat-accordion>
    <mat-accordion>
      <mat-expansion-panel class="mat-elevation-z0">
        <mat-expansion-panel-header class="right-aligned-header">
          <mat-panel-title>
            Body Match Rules
          </mat-panel-title>
          <mat-divider></mat-divider>
        </mat-expansion-panel-header>
        <app-add-body-rule-container
          [bodyRules]="this.requestMatchRule?.bodyRules"
          [saveBodyRules]="this.shouldSave"
          (bodyRulesOutput)="handleBodyOutput($event)"
        >
        </app-add-body-rule-container>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-expansion-panel>
</mat-accordion>
